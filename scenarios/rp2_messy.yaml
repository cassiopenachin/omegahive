scenario_id: rp2_messy
seed: 0
# RP2 reproduction DAG — "messy": setup reliable (0.9), experiments hard (0.3). Per-type
# *substantive* difficulty concentrates failure at the three-way experiment fork — the
# RCBench-faithful "messy" (substantive failure dominates). Setup reliably completes, so
# the pipeline reaches the fork and >1 experiment can escalate at once.
# (The prior block+silent operational-chaos workers are dropped — that texture lives in f6.)
plan:
  goal: "Reproduce a paper's results"
  tasks:
    - {id: understand, title: "Understand the paper and its claims", task_type: research}
    - {id: method,     title: "Study the method",                    task_type: research}
    - {id: data,       title: "Acquire and sanity-check the data",   task_type: data}
    - {id: implement,  title: "Implement the method",                task_type: coding}
    - {id: exp_1,      title: "Run result 1",                        task_type: experiment}
    - {id: exp_2,      title: "Run result 2 (ablation)",             task_type: experiment}
    - {id: exp_3,      title: "Run result 3",                        task_type: experiment}
    - {id: synthesize, title: "Compare reproduced results to paper", task_type: analysis}
    - {id: writeup,    title: "Write the report",                    task_type: writing}
  dependencies:
    - [method, understand]
    - [data, understand]
    - [implement, method]
    - [implement, data]
    - [exp_1, implement]
    - [exp_2, implement]
    - [exp_3, implement]
    - [synthesize, exp_1]
    - [synthesize, exp_2]
    - [synthesize, exp_3]
    - [writeup, synthesize]
run: {max_logical_ts: 1000, replications: 50}
workers:
  w1: {latency: {accept: 0, progress: 2, result: 4}, cost: 5,
       outcome: {p_success: 0.9,
                 success_by_type: {research: 0.9, data: 0.9, coding: 0.9,
                                   experiment: 0.3, analysis: 0.9, writing: 0.9}}}
  w2: {latency: {accept: 0, progress: 2, result: 4}, cost: 5,
       outcome: {p_success: 0.9,
                 success_by_type: {research: 0.9, data: 0.9, coding: 0.9,
                                   experiment: 0.3, analysis: 0.9, writing: 0.9}}}
coordinator: {thresholds: {stale_assigned: 8, blocked: 6}}
config: {tiers: 2}
labels:
  critical: [review.failed, task.escalated, "metric:stall", "metric:aging"]
  routine:  [task.progress, task.accepted, task.assigned]
expected:
  h6_detected: [stall, aging]
  invariants: {false_completion_rate: 0}
