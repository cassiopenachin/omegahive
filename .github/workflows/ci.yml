name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: omegahive
          POSTGRES_PASSWORD: omegahive
          POSTGRES_DB: omegahive
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U omegahive"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15

    env:
      OMEGAHIVE_DATABASE_URL: postgresql://omegahive:omegahive@localhost:5432/omegahive
      OMEGAHIVE_TEST_DATABASE_URL: postgresql://omegahive:omegahive@localhost:5432/omegahive_test

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Create test database
        run: PGPASSWORD=omegahive psql -h localhost -U omegahive -d omegahive -c 'CREATE DATABASE omegahive_test;'

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy

      - name: Test (pytest)
        run: uv run pytest -q
