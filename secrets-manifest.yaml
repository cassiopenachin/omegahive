# secrets-manifest.yaml — the env-var NAMES each service may see (deployment spec §4).
#
# Names only, never values. Secrets live in ${OMEGAHIVE_SECRETS_DIR} (per-host, mode 0700;
# files 0600), one env-file per service scoped to its role — never in the repo tree, an
# image, the lockfile, or any record. This file drives the credential-scope check: it scans
# every container's environment against its row, and anything beyond the row is a hard fail
# (deployment spec §7 step 7). A monolithic all-keys file is prohibited — it grants every
# container every key and defeats the scan.
#
# Note: the current deployment (#0) still delivers the OMEGAHIVE_* DSN via the shared `.env`;
# the per-service split (postgres.env / gateway.env) is staged. The notifier row is live now
# (its `notifier.env` is real). Rows carry `env_file` for provenance; `allowed` is the scan
# whitelist.

services:
  postgres:
    env_file: postgres.env
    allowed:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB

  # The omegahive image services (cli, migrate, seed, coordinator/worker/review, board-view,
  # notify, deploy-checks, test, lint). Only the scoped deployment DB role's DSN — no
  # provider keys (the credential scan hard-fails on any).
  gateway:
    env_file: gateway.env
    allowed:
      - OMEGAHIVE_DATABASE_URL
      - OMEGAHIVE_TEST_DATABASE_URL
      - OMEGAHIVE_RUN_ID

  # Provider keys for harness-driven runs (the LLM coordinator ladder). They terminate here,
  # never in an agent container.
  harness:
    env_file: harness.env
    allowed:
      - OPENROUTER_API_KEY
      - ANTHROPIC_API_KEY

  # The outbound attention-notifier (hive-native ops §2 item 4). Reads the spine (the DSN,
  # from the shared .env under #0) and sends Telegram messages. TELEGRAM_BOT_TOKEN is the
  # only credential; it is outbound-only and never logged or placed in a message.
  notifier:
    env_file: notifier.env
    allowed:
      - OMEGAHIVE_DATABASE_URL   # the read path (spine follower)
      - TELEGRAM_BOT_TOKEN       # bot credential — outbound sendMessage only
      - TELEGRAM_CHAT_ID         # destination chat (config, not a secret)
      - TELEGRAM_API_BASE        # optional endpoint override (self-host / tests)
