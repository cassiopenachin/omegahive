# Board-op catalog v1 — the command heads the coordinator is told it may emit.
# These are the coordinator authority ops (omegahive_port_spec.md §2 Op union; the
# binding skill equations). `port_op` names the omegahive.port Op the head maps to;
# that wiring is exercised in slice 2. `text` is the line the agent is shown.
version: board-ops-v1
entries:
  - head: assign
    text: "Assign a ready task to a worker: assign <task> <worker>"
    arity: 2
    port_op: AssignOp
  - head: reassign
    text: "Move a task to a different worker: reassign <task> <worker>"
    arity: 2
    port_op: ReassignOp
  - head: escalate
    text: "Escalate a blocked or stuck task to the human: escalate <task>"
    arity: 1
    port_op: EscalateOp
  - head: close
    text: "Close a task that has passed review: close <task>"
    arity: 1
    port_op: CloseOp
  - head: reopen
    text: "Reopen a task that is in review: reopen <task>"
    arity: 1
    port_op: ReopenOp
  - head: prune
    text: "Abandon a doomed not-done task; it drops from its join's pool but never lowers the join's k: prune <task>"
    arity: 1
    port_op: PruneOp
