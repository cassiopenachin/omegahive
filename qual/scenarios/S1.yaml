id: S1-happy-path-assign
description: >
  One ready task (t1) and one available worker (w1). The coordinator should assign
  the task and report status. Pass: exactly one accepted assign, no rejections, no
  junk ops, no identical retries.
persona: personas/coordinator-v2/prompt.txt
skills_catalog: catalogs/board-ops-v2.yaml
board_fixture: fixtures/one-ready-task.json
turns:
  - inject: "New work is on the board. Assign it and report."
  - inject: "Status?"
op_vocabulary: [assign, escalate, close]
expected:
  labels: [assigns-ready-task, reports-status]
  hard_fail: [retry-identical>2]
budget: {usd: 0.50, max_turns: 8}
