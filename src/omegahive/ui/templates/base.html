<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ page|title }} · OmegaHive{% endblock %}</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='ui.css') }}">
    <script defer src="{{ request.url_for('static', path='live.js') }}"></script>
  </head>
  <body data-stream-url="{{ stream_url }}?page={{ page }}&cursor={{ cursor }}&generation={{ generation if generation is not none else '' }}{% if selected_actor %}&actor={{ selected_actor }}{% endif %}{% if selected_type %}&type={{ selected_type }}{% endif %}">
    <header class="site-header">
      <a class="brand" href="{{ base_path }}/run/{{ run_id }}/board" aria-label="OmegaHive board">
        <span class="brand-mark" aria-hidden="true">Ω</span>
        <span>OmegaHive</span>
      </a>
      <div class="run-context"><span class="live-dot" aria-hidden="true"></span> Run <strong>{{ run_id }}</strong></div>
      <nav aria-label="Run views">
        <a href="{{ base_path }}/run/{{ run_id }}/board" {% if page == 'board' %}aria-current="page"{% endif %}>Board</a>
        <a href="{{ base_path }}/run/{{ run_id }}/events" {% if page == 'events' %}aria-current="page"{% endif %}>Events</a>
        <a href="{{ base_path }}/run/{{ run_id }}/metrics" {% if page == 'metrics' %}aria-current="page"{% endif %}>Metrics</a>
      </nav>
      {% include "fragments/freshness.html" %}
    </header>
    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
