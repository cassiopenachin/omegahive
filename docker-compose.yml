services:
  postgres:
    image: postgres:16
    container_name: omegahive-pg
    environment:
      POSTGRES_USER: omegahive
      POSTGRES_PASSWORD: omegahive
      POSTGRES_DB: omegahive
    ports:
      - "5432:5432"
    volumes:
      - omegahive-pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omegahive"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  omegahive-pgdata:
