name: omegahive

# Generic deployment profile (deployment spec §4). Every non-Postgres service runs
# the one `omegahive` image as a one-shot command — migrations, seed, the three
# acceptance actors, board-view, tests, lint, and the containerized pg_dump backup.
# A host needs only an OCI runtime (rootless Podman) + compose v2; no host runtimes.

x-omega: &omega
  image: omegahive:dev
  build: .
  env_file: [.env]
  depends_on:
    postgres:
      condition: service_healthy
  volumes:
    # durable basis_seq per (run, actor) — crash-redispatch idempotency (port spec §3a).
    - omegahive-basis:/var/lib/omegahive

services:
  postgres:
    image: postgres:16@sha256:1570e4013933875bf54995e9010e31420b5e21dd5f2524e5395089d480cc2df1
    container_name: omegahive-pg
    environment:
      POSTGRES_USER: omegahive
      POSTGRES_PASSWORD: omegahive
      POSTGRES_DB: omegahive
    # Loopback-only: the log store is never exposed off-host (deployment spec §7).
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - omegahive-pgdata:/var/lib/postgresql/data
      # :ro,Z — SELinux relabel required for rootless Podman on Fedora/RHEL.
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omegahive"]
      interval: 2s
      timeout: 3s
      retries: 30

  # --- one-shot tooling services (the omegahive image) ----------------------

  # generic CLI entry: `docker compose run --rm cli <command …>` (the image ENTRYPOINT
  # is `omegahive`). Alias for daily use: alias omegahive='docker compose run --rm cli'
  cli:
    <<: *omega
    command: ["--help"]

  migrate:
    <<: *omega
    command: ["db-migrate"]

  seed:
    <<: *omega
    command: ["seed-demo", "--run-id", "${OMEGAHIVE_RUN_ID:-accept}",
              "--plan", "scenarios/demo_plan.yaml"]

  # The three acceptance actors — each its own process/container, coordinating only
  # through Postgres via the port. `compose up coordinator worker review` is the
  # multi-process acceptance run (deployment spec §7 step 6 / port spec §9).
  coordinator:
    <<: *omega
    command: ["act", "coordinator", "--run-id", "${OMEGAHIVE_RUN_ID:-accept}", "--workers", "w1"]

  worker:
    <<: *omega
    command: ["act", "worker", "--run-id", "${OMEGAHIVE_RUN_ID:-accept}", "--agent-id", "w1"]

  review:
    <<: *omega
    command: ["act", "review", "--run-id", "${OMEGAHIVE_RUN_ID:-accept}"]

  board-view:
    <<: *omega
    command: ["board-view", "${OMEGAHIVE_RUN_ID:-accept}"]

  # The read-only operator web UI (ui spec §5). A long-running uvicorn server on the
  # omegahive image, reading the spine over the compose network (board/events/metrics
  # screens; no write path). NOT a front door: the *host* publish is loopback-only, so the
  # house Caddy on :8443 is the sole ingress, reverse-proxying https://<host>:8443/omegahive/
  # here. Never publish this on 0.0.0.0. `--host 0.0.0.0` (ui-serve default) binds only the
  # container's own netns — the loopback host-publish below is the real boundary (same shape
  # postgres uses). OMEGAHIVE_UI_BASE_PATH is the serving prefix (config, not a secret) and
  # MUST match the Caddy handle block; empty would serve at the root. Container listens on
  # 8000; the app trusts proxy headers so url_for reflects the external https origin.
  ui:
    <<: *omega
    command: ["ui-serve"]
    environment:
      - OMEGAHIVE_UI_BASE_PATH=${OMEGAHIVE_UI_BASE_PATH:-/omegahive}
      - OMEGAHIVE_UI_DEFAULT_RUN=${OMEGAHIVE_RUN_ID:-accept}
    ports:
      # host loopback only -> container 8000. Change the host port via OMEGAHIVE_UI_HOST_PORT
      # (must match the Caddy reverse_proxy target). Never 0.0.0.0 (deployment posture).
      - "127.0.0.1:${OMEGAHIVE_UI_HOST_PORT:-8811}:8000"
    restart: unless-stopped

  # Full suite in-container (deployment spec §4: no host pytest).
  test:
    <<: *omega
    entrypoint: ["pytest"]
    command: ["-q"]

  lint:
    <<: *omega
    entrypoint: ["sh", "-c"]
    command: ["ruff check . && mypy"]

  deploy-checks:
    <<: *omega
    command: ["deploy-checks"]

  # The LLM coordinator ladder (R1+). The provider key is a *host-passthrough* env var,
  # listed here with no value — compose forwards it only to services that declare it, so it
  # reaches this container but never `deploy-checks` (which declares none), and it is never
  # written to `.env`. That keeps the substrate credential scan honest (deployment/stage2
  # §5.2): the key lives only in the harness run context. Run e.g.
  #   OPENROUTER_API_KEY=… docker compose run --rm ladder smoke --model openrouter/<model>
  ladder:
    <<: *omega
    environment:
      - OPENROUTER_API_KEY
      - ANTHROPIC_API_KEY
    entrypoint: ["ladder"]

  # The outbound attention-notifier (hive-native ops §2 item 4). A long-running follower
  # of the spine's *read path* — it pings Telegram on question/blocked/escalated so a
  # blocking question at 2am operator-time doesn't sit until the next manual check-in.
  # Outbound only: no inbound port, no ack path. The bot token lives in its own secrets
  # env-file (deployment spec §4), never in .env / the image / a log / a message. Its read
  # cursor persists on its own named volume, so a restart resumes without replay or
  # duplicate. Start it explicitly: `podman compose up -d notifier`.
  notifier:
    <<: *omega
    command: ["notify", "--run-id", "${OMEGAHIVE_RUN_ID:-accept}"]
    restart: unless-stopped
    environment:
      # Daily-heartbeat hour (UTC, integer). Config, not a secret — so it rides the compose
      # environment here, never notifier.env. Declared in secrets-manifest.yaml (notifier row).
      HEARTBEAT_HOUR_UTC: ${HEARTBEAT_HOUR_UTC:-6}
      # UI base URL for message deep links: the external origin+prefix the phone already uses
      # (e.g. https://<host>:8443/omegahive — the same :8443 the UI is served behind). Config,
      # not a secret; empty default = links absent, render unchanged. Same pattern as above.
      OMEGAHIVE_UI_BASE_URL: ${OMEGAHIVE_UI_BASE_URL:-}
    env_file:
      - .env                                       # OMEGAHIVE_DATABASE_URL (the read path)
      # required:false so an unconfigured host doesn't break `compose config`/other services;
      # the notifier fails fast at startup if the token/chat are absent.
      - path: ${OMEGAHIVE_SECRETS_DIR}/notifier.env   # TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID
        required: false
    volumes:
      # :z — shared SELinux label so the cursor survives container replacement. Without it,
      # rootless Podman gives each container a unique MCS category and a *new* notifier
      # instance is denied read/write to the previous one's cursor file (restart breaks).
      - omegahive-notifier:/var/lib/omegahive/notifier:z   # persisted read cursor

  # Containerized backup: pg_dump of the log store from the pinned postgres image
  # (deployment spec §4/§5). `profiles: [ops]` keeps it out of a plain `up`; the
  # host systemd timer runs `compose run --rm backup`. /backups is a HOST bind mount
  # (${OMEGAHIVE_BACKUP_DIR} — the pointer var, no absolute host path in the committed
  # file, per deployment spec §4) so the dumps sit on the host filesystem where the
  # operator pulls them over the tailnet SSH path; the workspace git bundles land in the
  # same directory (deploy/git_bundle.sh) so one directory restores both stores.
  # OMEGAHIVE_BACKUP_KEEP bounds retention (default 14; disk is finite, operator remote).
  backup:
    image: postgres:16@sha256:1570e4013933875bf54995e9010e31420b5e21dd5f2524e5395089d480cc2df1
    profiles: ["ops"]
    env_file: [.env]
    environment:
      - OMEGAHIVE_BACKUP_KEEP
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # :z — shared SELinux label; the deploy user (rootless: container root maps to it)
      # owns the dumps, so `rsync beastie:...` reads them without a relabel dance.
      - ${OMEGAHIVE_BACKUP_DIR:-./backups}:/backups:z
      - ./scripts:/scripts:ro,Z
    entrypoint: ["sh", "/scripts/pg_backup.sh"]

volumes:
  omegahive-pgdata:
  omegahive-basis:
  omegahive-notifier:
